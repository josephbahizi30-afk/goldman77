<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Réservation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .info-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .reservation-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }

        .reservation-item.cancelled {
            border-left-color: #dc3545;
            opacity: 0.7;
        }

        .res-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .res-client {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .res-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .res-details {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .action-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.9em;
            margin: 0;
        }

        .delete-btn {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-in-out;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .no-reservations {
            text-align: center;
            color: #999;
            padding: 30px;
            font-style: italic;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            background: #ddd;
            color: #333;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Système de Réservation</h1>
            <p class="subtitle">Gérez vos réservations facilement et efficacement</p>
        </header>

        <div class="main-grid">
            <!-- Formulaire de création -->
            <div class="card">
                <h2>📝 Créer une Réservation</h2>
                <div id="alertCreation"></div>
                <form id="formReservation">
                    <div class="form-group">
                        <label for="nomClient">Nom du Client:</label>
                        <input type="text" id="nomClient" required placeholder="Ex: Jean Dupont">
                    </div>
                    <div class="form-group">
                        <label for="ressource">Salle:</label>
                        <select id="ressource" required>
                            <option value="">-- Sélectionner une salle --</option>
                            <option value="1">Salle A (20 personnes)</option>
                            <option value="2">Salle B (30 personnes)</option>
                            <option value="3">Salle C (15 personnes)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dateDebut">Date de Début:</label>
                        <input type="date" id="dateDebut" required>
                    </div>
                    <div class="form-group">
                        <label for="dateFin">Date de Fin:</label>
                        <input type="date" id="dateFin" required>
                    </div>
                    <div class="form-group">
                        <label for="nombrePersonnes">Nombre de Personnes:</label>
                        <input type="number" id="nombrePersonnes" min="1" required placeholder="Ex: 10">
                    </div>
                    <button type="submit">Créer la Réservation</button>
                </form>
            </div>

            <!-- Vérification de disponibilité -->
            <div class="card">
                <h2>✅ Vérifier la Disponibilité</h2>
                <div id="alertDisponibilite"></div>
                <form id="formDisponibilite">
                    <div class="form-group">
                        <label for="ressourceDisp">Salle:</label>
                        <select id="ressourceDisp" required>
                            <option value="">-- Sélectionner une salle --</option>
                            <option value="1">Salle A</option>
                            <option value="2">Salle B</option>
                            <option value="3">Salle C</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dateDebutDisp">Date de Début:</label>
                        <input type="date" id="dateDebutDisp" required>
                    </div>
                    <div class="form-group">
                        <label for="dateFinDisp">Date de Fin:</label>
                        <input type="date" id="dateFinDisp" required>
                    </div>
                    <button type="submit" class="info-btn">Vérifier</button>
                </form>
                <div id="resultatDisp"></div>
            </div>
        </div>

        <!-- Liste des réservations -->
        <div class="card full-width">
            <h2>📋 Liste des Réservations</h2>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="afficherTab('toutes')">Toutes</button>
                <button class="tab-btn" onclick="afficherTab('confirmees')">Confirmées</button>
                <button class="tab-btn" onclick="afficherTab('annulees')">Annulées</button>
            </div>

            <div id="alertListe"></div>

            <div id="tab-toutes" class="tab-content active">
                <div id="listeToutes"></div>
            </div>
            <div id="tab-confirmees" class="tab-content">
                <div id="listeConfirmees"></div>
            </div>
            <div id="tab-annulees" class="tab-content">
                <div id="listeAnnulees"></div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="statConfirmees">0</div>
                    <div class="stat-label">Confirmées</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="statAnnulees">0</div>
                    <div class="stat-label">Annulées</div>
                </div>
            </div>
        </div>
    </div>

    <script src="reservation-browser.js"></script>
</body>
</html>
